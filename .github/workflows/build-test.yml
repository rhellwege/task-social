name: Build and Test
on: [push]
jobs:
  build_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: "backend/go.mod"
          go-sum-file: backend/go.sum
      - name: Build API
        working-directory: ./backend
        run: go build cmd/main.go
